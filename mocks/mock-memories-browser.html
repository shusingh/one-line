<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Line · Memories Mock</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><ellipse cx="13.5" cy="17" rx="9.4" ry="8.6" fill="%231a1a1f"/><circle cx="24.5" cy="8.6" r="2.6" fill="%231a1a1f"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Hanken+Grotesk:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #efeae0;
    --sumi: #1a1a1f;
    --ai: #16407a;
    --shu: #c0432e;
    --matsuba: #2e6e52;
    --matcha: #567a26;
    --line: rgba(26, 26, 31, 0.18);
    --bg-elevated: #f7f3eb;
    --bg-elevated-2: #e6dfd3;
    --border: rgba(26, 26, 31, 0.1);
    --text-secondary: #3a3833;
    --text-tertiary: #67635b;
    --accent: var(--matcha);
    --accent-strong: #435f1d;
    --font-display: 'Newsreader', Georgia, serif;
    --font-body: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-jp: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  }

  @font-face {
    font-family: 'Shippori Mincho';
    font-style: normal;
    font-weight: 700;
    src: url('fonts/shippori-mincho-marks.woff2') format('woff2');
    unicode-range: U+4E00, U+884C, U+65E5, U+8A18, U+8352, U+66C7, U+51EA, U+6674, U+8F1D;
    font-display: swap;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-width: 320px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.42), transparent 34%),
      radial-gradient(circle at 82% 78%, rgba(112, 88, 53, 0.045), transparent 42%),
      var(--paper);
    color: var(--sumi);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('paper-texture.jpg') center / cover no-repeat;
    opacity: 0.42;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: multiply;
    filter: brightness(1.12) contrast(0.8) saturate(0.68) blur(0.3px);
  }
  button, input { font: inherit; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .kanji {
    position: fixed;
    top: 74px;
    right: max(18px, calc(50vw - 570px));
    writing-mode: vertical-rl;
    font-family: var(--font-jp);
    font-size: clamp(54px, 7vw, 92px);
    letter-spacing: 0.14em;
    color: rgba(26, 26, 31, 0.045);
    pointer-events: none;
    z-index: 0;
  }
  .page {
    position: relative;
    z-index: 1;
    width: min(1120px, calc(100vw - 40px));
    margin: 0 auto;
    padding: 54px 0 64px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: flex-start;
    margin-bottom: 30px;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
  .eyebrow .jp { color: var(--text-tertiary); font-family: var(--font-jp); letter-spacing: 0.1em; }
  h1 {
    margin: 0;
    font-family: var(--font-display);
    font-size: clamp(48px, 7vw, 84px);
    line-height: 0.92;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); font-style: italic; font-weight: 300; }
  .today-link {
    border: 1px solid rgba(86, 122, 38, 0.26);
    border-radius: 999px;
    background: rgba(247, 243, 235, 0.72);
    color: var(--accent-strong);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 13px;
    white-space: nowrap;
  }

  .archive-grid {
    display: grid;
    grid-template-columns: 190px minmax(0, 1fr) 330px;
    gap: 22px;
    align-items: start;
  }
  .panel {
    background: rgba(247, 243, 235, 0.68);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .rail {
    position: sticky;
    top: 22px;
    padding: 16px;
  }
  .rail-title, .section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .year-stack {
    display: grid;
    gap: 7px;
    margin: 12px 0 20px;
  }
  .year-btn, .month-btn, .mood-btn {
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    text-align: left;
  }
  .year-btn {
    display: flex;
    justify-content: space-between;
    padding: 8px 9px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .year-btn.active {
    border-color: rgba(86, 122, 38, 0.24);
    background: rgba(86, 122, 38, 0.08);
    color: var(--accent-strong);
  }
  .month-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .month-btn {
    min-height: 31px;
    border-radius: 999px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  .month-btn.active {
    background: var(--sumi);
    color: #f7f2e6;
  }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search {
    width: 100%;
    min-height: 42px;
    border: none;
    border-bottom: 1.5px solid var(--line);
    background: transparent;
    color: var(--sumi);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    outline: none;
    padding: 4px 2px 9px;
  }
  .search::placeholder { color: #a49b8a; }
  .mood-filter {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mood-btn {
    display: grid;
    place-items: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border-color: rgba(26, 26, 31, 0.08);
    background: rgba(247, 243, 235, 0.56);
    opacity: 0.72;
  }
  .mood-btn.active { opacity: 1; outline: 1.5px solid var(--sumi); outline-offset: 2px; }
  .mood-dot {
    width: 10px;
    height: 10px;
    border-radius: 50% 60% 55% 65%;
    display: inline-block;
  }
  .m1 { background: #8d8a92; }
  .m2 { background: var(--ai); }
  .m3 { background: var(--matsuba); }
  .m4 { background: var(--matcha); }
  .m5 { background: var(--shu); }

  .memory-stream {
    display: grid;
    gap: 12px;
  }
  .month-heading {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: baseline;
    margin: 10px 0 2px;
  }
  .month-heading h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 30px;
  }
  .month-heading span {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .memory-card {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 16px;
    width: 100%;
    padding: 15px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(247, 243, 235, 0.68);
    color: inherit;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  }
  .memory-card:hover, .memory-card.active {
    background: rgba(247, 243, 235, 0.9);
    border-color: rgba(86, 122, 38, 0.34);
  }
  .memory-card.active { transform: translateX(2px); }
  .date-block {
    font-family: var(--font-mono);
    color: var(--text-tertiary);
  }
  .date-block .day {
    display: block;
    font-size: 28px;
    line-height: 1;
    color: var(--sumi);
    font-family: var(--font-display);
  }
  .date-block .weekday {
    display: block;
    margin-top: 5px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .memory-copy {
    display: grid;
    gap: 8px;
  }
  .memory-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .memory-text {
    margin: 0;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    line-height: 1.42;
  }

  .detail {
    position: sticky;
    top: 22px;
    overflow: hidden;
  }
  .detail-hero {
    min-height: 260px;
    padding: 24px;
    display: grid;
    align-content: space-between;
    background:
      radial-gradient(circle at 72% 18%, rgba(86, 122, 38, 0.16), transparent 28%),
      radial-gradient(circle at 20% 80%, rgba(22, 64, 122, 0.1), transparent 34%),
      rgba(247, 243, 235, 0.82);
  }
  .detail-date {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .detail-text {
    margin: 28px 0;
    font-family: var(--font-display);
    font-size: 33px;
    font-style: italic;
    line-height: 1.12;
    letter-spacing: -0.01em;
  }
  .detail-mood {
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .mini-calendar {
    padding: 18px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    margin-top: 14px;
  }
  .calendar-day {
    aspect-ratio: 1;
    border-radius: 50% 60% 55% 65%;
    background: rgba(26, 26, 31, 0.055);
    border: 0;
    cursor: pointer;
  }
  .calendar-day.has { background: var(--matcha); }
  .calendar-day.sel { outline: 1.5px solid var(--sumi); outline-offset: 2px; }
  .insight-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 22px;
  }
  .insight {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(247, 243, 235, 0.58);
  }
  .insight b {
    display: block;
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    line-height: 1;
  }
  .insight span {
    display: block;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  @media (max-width: 980px) {
    .archive-grid { grid-template-columns: 160px minmax(0, 1fr); }
    .detail { grid-column: 1 / -1; position: static; }
  }
  @media (max-width: 720px) {
    .kanji { display: none; }
    .page { width: calc(100vw - 36px); padding-top: 40px; }
    .topbar { display: grid; }
    .today-link { justify-self: start; }
    .archive-grid { grid-template-columns: 1fr; }
    .rail { position: static; }
    .toolbar { grid-template-columns: 1fr; }
    .memory-card { grid-template-columns: 58px minmax(0, 1fr); padding: 14px; }
    .detail-text { font-size: 28px; }
    .insight-row { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="kanji" aria-hidden="true">一行日記</div>
<main class="page">
  <header class="topbar">
    <div>
      <div class="eyebrow">ONE LINE JOURNAL <span class="jp">一行日記</span></div>
      <h1>Memory <span>Archive</span></h1>
    </div>
    <a class="today-link" href="../index.html">Today</a>
  </header>

  <section class="archive-grid">
    <aside class="panel rail">
      <div class="rail-title">Years</div>
      <div class="year-stack">
        <button class="year-btn active"><span>2026</span><span>128</span></button>
        <button class="year-btn"><span>2025</span><span>241</span></button>
        <button class="year-btn"><span>2024</span><span>198</span></button>
      </div>

      <div class="rail-title">Months</div>
      <div class="month-list">
        <button class="month-btn">Jan</button>
        <button class="month-btn">Feb</button>
        <button class="month-btn">Mar</button>
        <button class="month-btn">Apr</button>
        <button class="month-btn">May</button>
        <button class="month-btn active">Jun</button>
        <button class="month-btn">Jul</button>
        <button class="month-btn">Aug</button>
        <button class="month-btn">Sep</button>
        <button class="month-btn">Oct</button>
        <button class="month-btn">Nov</button>
        <button class="month-btn">Dec</button>
      </div>
    </aside>

    <section>
      <div class="toolbar">
        <input class="search" type="search" placeholder="Search the ink archive…" aria-label="Search memories">
        <div class="mood-filter" aria-label="Filter by mood">
          <button class="mood-btn active" data-mood="all" aria-label="All moods"><span class="mood-dot" style="background:var(--sumi)"></span></button>
          <button class="mood-btn" data-mood="1" aria-label="Rough"><span class="mood-dot m1"></span></button>
          <button class="mood-btn" data-mood="2" aria-label="Cloudy"><span class="mood-dot m2"></span></button>
          <button class="mood-btn" data-mood="3" aria-label="Calm"><span class="mood-dot m3"></span></button>
          <button class="mood-btn" data-mood="4" aria-label="Clear"><span class="mood-dot m4"></span></button>
          <button class="mood-btn" data-mood="5" aria-label="Radiant"><span class="mood-dot m5"></span></button>
        </div>
      </div>

      <div class="month-heading">
        <h2>June 2026</h2>
        <span id="result-count">9 memories</span>
      </div>
      <div class="memory-stream" id="memory-stream"></div>
    </section>

    <aside class="panel detail">
      <div class="detail-hero">
        <div class="detail-date" id="detail-date"></div>
        <p class="detail-text" id="detail-text"></p>
        <div class="detail-mood" id="detail-mood"></div>
      </div>
      <div class="mini-calendar">
        <div class="section-title">June map</div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="insight-row">
          <div class="insight"><b>22</b><span>entries</span></div>
          <div class="insight"><b>凪</b><span>top mood</span></div>
          <div class="insight"><b>11</b><span>streak</span></div>
        </div>
      </div>
    </aside>
  </section>
</main>

<script>
const moods = {
  1: { jp: '荒', en: 'rough', className: 'm1' },
  2: { jp: '曇', en: 'cloudy', className: 'm2' },
  3: { jp: '凪', en: 'calm', className: 'm3' },
  4: { jp: '晴', en: 'clear', className: 'm4' },
  5: { jp: '輝', en: 'radiant', className: 'm5' },
};

const entries = [
  { day: 28, weekday: 'Sun', mood: 4, text: 'Sat outside with tea and watched the whole block turn gold.' },
  { day: 26, weekday: 'Fri', mood: 3, text: 'Solved the tiny bug that had been making the day feel louder than it was.' },
  { day: 24, weekday: 'Wed', mood: 2, text: 'A slow blue day, but the walk home gave it a clean edge.' },
  { day: 21, weekday: 'Sun', mood: 5, text: 'The demo landed, and everyone could feel the room loosen.' },
  { day: 18, weekday: 'Thu', mood: 3, text: 'Kept the promise small and actually kept it.' },
  { day: 15, weekday: 'Mon', mood: 1, text: 'Frayed at the edges, but still here, still writing the line.' },
  { day: 11, weekday: 'Thu', mood: 4, text: 'Dinner by the window; basil, rain, and a quiet kind of enough.' },
  { day: 7, weekday: 'Sun', mood: 3, text: 'Read two pages and let that count as returning.' },
  { day: 3, weekday: 'Wed', mood: 5, text: 'Finally tried that cafe by the park, worth every minute.' },
];

let selected = entries[1];
let activeMood = 'all';

const stream = document.getElementById('memory-stream');
const search = document.querySelector('.search');

function renderEntries() {
  const query = search.value.trim().toLowerCase();
  const visible = entries.filter((entry) => {
    const moodMatch = activeMood === 'all' || entry.mood === Number(activeMood);
    const textMatch = !query || entry.text.toLowerCase().includes(query);
    return moodMatch && textMatch;
  });
  document.getElementById('result-count').textContent = `${visible.length} ${visible.length === 1 ? 'memory' : 'memories'}`;
  stream.innerHTML = '';
  for (const entry of visible) {
    const mood = moods[entry.mood];
    const card = document.createElement('button');
    card.className = `memory-card${entry === selected ? ' active' : ''}`;
    card.type = 'button';
    card.innerHTML = `
      <span class="date-block"><span class="day">${entry.day}</span><span class="weekday">${entry.weekday}</span></span>
      <span class="memory-copy">
        <span class="memory-meta"><span class="mood-dot ${mood.className}"></span>${mood.jp} ${mood.en}</span>
        <span class="memory-text">${entry.text}</span>
      </span>`;
    card.addEventListener('click', () => {
      selected = entry;
      renderEntries();
      renderDetail();
      renderCalendar();
    });
    stream.appendChild(card);
  }
}

function renderDetail() {
  const mood = moods[selected.mood];
  document.getElementById('detail-date').textContent = `${selected.weekday}, June ${selected.day}, 2026`;
  document.getElementById('detail-text').textContent = selected.text;
  document.getElementById('detail-mood').innerHTML = `<span class="mood-dot ${mood.className}"></span>${mood.jp} ${mood.en}`;
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  const daysWithEntries = new Map(entries.map((entry) => [entry.day, entry]));
  for (let i = 1; i <= 35; i++) {
    const day = document.createElement('button');
    const entry = daysWithEntries.get(i);
    day.className = `calendar-day${entry ? ' has' : ''}${entry === selected ? ' sel' : ''}`;
    day.type = 'button';
    day.ariaLabel = `June ${i}`;
    if (entry) {
      day.style.background = `var(--${entry.mood === 2 ? 'ai' : entry.mood === 5 ? 'shu' : entry.mood === 3 ? 'matsuba' : entry.mood === 4 ? 'matcha' : 'bg-elevated-2'})`;
      day.addEventListener('click', () => {
        selected = entry;
        renderEntries();
        renderDetail();
        renderCalendar();
      });
    }
    grid.appendChild(day);
  }
}

document.querySelectorAll('.mood-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    activeMood = btn.dataset.mood;
    document.querySelectorAll('.mood-btn').forEach((b) => b.classList.toggle('active', b === btn));
    renderEntries();
  });
});
search.addEventListener('input', renderEntries);
renderEntries();
renderDetail();
renderCalendar();
</script>
</body>
</html>
