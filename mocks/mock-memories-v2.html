<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Line · Memory Archive v2 Mock</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><ellipse cx="13.5" cy="17" rx="9.4" ry="8.6" fill="%231a1a1f"/><circle cx="24.5" cy="8.6" r="2.6" fill="%231a1a1f"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Hanken+Grotesk:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&text=%E4%B8%80%E8%A1%8C%E6%97%A5%E8%A8%98%E8%8D%92%E6%9B%87%E5%87%AA%E6%99%B4%E8%BC%9D&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #efeae0;
    --sumi: #1a1a1f;
    --shu: #c0432e;
    --line: rgba(26, 26, 31, 0.18);
    --bg-elevated: #f7f3eb;
    --border: rgba(26, 26, 31, 0.1);
    --text-secondary: #3a3833;
    --text-tertiary: #67635b;
    --accent: #567a26;
    --accent-strong: #435f1d;
    --font-display: 'Newsreader', Georgia, serif;
    --font-body: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-jp: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    --mood1: #8d8a92; --mood2: #16407a; --mood3: #2e6e52; --mood4: #567a26; --mood5: #cf8d12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,.42), transparent 34%),
      radial-gradient(circle at 82% 78%, rgba(112,88,53,.045), transparent 42%),
      var(--paper);
    color: var(--sumi);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: url('paper-texture.jpg') center / cover no-repeat;
    opacity: .42; pointer-events: none; z-index: 1;
    mix-blend-mode: multiply;
    filter: brightness(1.12) contrast(.8) saturate(.68) blur(.3px);
  }
  button, input { font: inherit; }
  button:focus-visible, input:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .kanji {
    position: fixed; top: 74px; right: max(18px, calc(50vw - 590px));
    writing-mode: vertical-rl; font-family: var(--font-jp); font-weight: 700;
    font-size: clamp(54px, 7vw, 92px); letter-spacing: .14em;
    color: rgba(26,26,31,.045); pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 2; width: min(1120px, calc(100vw - 40px)); margin: 0 auto; padding: 54px 0 64px; }
  .topbar { display: flex; justify-content: space-between; gap: 24px; align-items: flex-start; margin-bottom: 30px; }
  .eyebrow {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .06em; color: var(--accent);
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
  .eyebrow .jp { color: var(--text-tertiary); font-family: var(--font-jp); letter-spacing: .1em; }
  h1 { font-family: var(--font-display); font-weight: 400; font-size: clamp(44px, 6vw, 68px); line-height: .95; letter-spacing: -.02em; }
  h1 span { color: var(--accent); font-style: italic; font-weight: 300; }
  .today-link {
    border: 1px solid rgba(86,122,38,.26); border-radius: 999px; background: rgba(247,243,235,.72);
    color: var(--accent-strong); text-decoration: none;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    padding: 9px 13px; white-space: nowrap;
  }

  .archive-grid { display: grid; grid-template-columns: 190px minmax(0, 1fr) 330px; gap: 22px; align-items: start; }
  .panel { background: rgba(247,243,235,.68); border: 1px solid var(--border); border-radius: 8px; }
  .rail { position: sticky; top: 22px; padding: 16px; }
  .rail-title, .section-title {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-tertiary);
  }
  .year-stack { display: grid; gap: 7px; margin: 12px 0 20px; }
  .year-btn, .month-btn { border: 1px solid transparent; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .year-btn { display: flex; justify-content: space-between; padding: 8px 9px; border-radius: 6px; font-family: var(--font-mono); font-size: 12px; }
  .year-btn.active { border-color: rgba(86,122,38,.24); background: rgba(86,122,38,.08); color: var(--accent-strong); }
  .month-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 12px; }
  .month-btn { min-height: 31px; border-radius: 999px; text-align: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: .04em; }
  .month-btn.active { background: var(--sumi); color: #f7f2e6; }
  .month-btn:disabled { opacity: .35; cursor: default; }

  .toolbar { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; margin-bottom: 16px; }
  .search {
    width: 100%; min-height: 42px; border: none; border-bottom: 1.5px solid var(--line);
    background: transparent; color: var(--sumi);
    font-family: var(--font-display); font-style: italic; font-size: 20px;
    outline: none; padding: 4px 2px 9px;
  }
  .search::placeholder { color: #a49b8a; }
  .search:focus { border-color: var(--sumi); }
  .mood-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mood-btn {
    display: grid; place-items: center; width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(26,26,31,.08); background: rgba(247,243,235,.56);
    opacity: .62; cursor: pointer; transition: all .15s ease;
  }
  .mood-btn:hover { opacity: .9; }
  .mood-btn.active { opacity: 1; outline: 1.5px solid var(--sumi); outline-offset: 2px; }
  .mood-btn svg { width: 20px; height: 20px; }
  .mood-btn .all { font-family: var(--font-mono); font-size: 9px; letter-spacing: .04em; color: var(--text-secondary); }

  .memory-stream { display: grid; gap: 12px; }
  .month-heading { display: flex; justify-content: space-between; gap: 16px; align-items: baseline; margin: 10px 0 2px; }
  .month-heading h2 { font-family: var(--font-display); font-weight: 400; font-size: 26px; }
  .month-heading span { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
  .memory-card {
    display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 16px; width: 100%;
    padding: 15px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: rgba(247,243,235,.68); color: inherit; cursor: pointer; text-align: left;
    transition: border-color .2s ease, background .2s ease, transform .2s ease;
  }
  .memory-card:hover, .memory-card.active { background: rgba(247,243,235,.9); border-color: rgba(86,122,38,.34); }
  .memory-card.active { transform: translateX(2px); }
  .date-block { font-family: var(--font-mono); color: var(--text-tertiary); }
  .date-block .day { display: block; font-size: 28px; line-height: 1; color: var(--sumi); font-family: var(--font-display); }
  .date-block .weekday { display: block; margin-top: 5px; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .memory-copy { display: grid; gap: 8px; }
  .memory-meta {
    display: flex; gap: 8px; align-items: center;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-tertiary);
  }
  .memory-meta svg { width: 15px; height: 15px; }
  .memory-text { font-family: var(--font-display); font-style: italic; font-size: 18px; line-height: 1.42; }
  .empty {
    padding: 30px; border: 1px dashed var(--border); border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); text-align: center;
  }

  /* Pagination: turning leaves */
  .pager {
    display: flex; justify-content: center; align-items: center; gap: 20px;
    margin-top: 26px; font-family: var(--font-mono); font-size: 11.5px; color: var(--text-tertiary);
  }
  .pager button {
    border: 1px solid var(--border); border-radius: 999px; background: rgba(247,243,235,.72);
    color: var(--accent-strong); cursor: pointer; padding: 8px 16px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em;
    transition: border-color .2s ease, background .2s ease;
  }
  .pager button:hover:not(:disabled) { border-color: rgba(86,122,38,.4); background: rgba(247,243,235,.95); }
  .pager button:disabled { opacity: .35; cursor: default; }
  .pager .leaf { font-family: var(--font-jp); color: var(--text-tertiary); }

  .detail { position: sticky; top: 22px; overflow: hidden; }
  .detail-hero {
    min-height: 250px; padding: 24px; display: grid; align-content: space-between;
    background:
      radial-gradient(circle at 72% 18%, rgba(86,122,38,.14), transparent 30%),
      radial-gradient(circle at 20% 80%, rgba(22,64,122,.09), transparent 34%),
      rgba(247,243,235,.82);
  }
  .detail-date { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); }
  .detail-text { margin: 24px 0; font-family: var(--font-display); font-size: 30px; font-style: italic; line-height: 1.15; letter-spacing: -.01em; }
  .detail-mood {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .detail-mood svg { width: 22px; height: 22px; }
  .mini-calendar { padding: 18px 20px 20px; border-top: 1px solid var(--border); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; margin-top: 14px; }
  .calendar-day {
    aspect-ratio: 1; border-radius: 50% 60% 55% 65%;
    background: rgba(26,26,31,.055); border: 0;
  }
  .calendar-day.has { cursor: pointer; }
  .calendar-day.sel { outline: 1.5px solid var(--sumi); outline-offset: 2px; }
  .insight-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 22px; }
  .insight { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(247,243,235,.58); }
  .insight b { display: block; font-family: var(--font-display); font-size: 26px; font-weight: 400; line-height: 1; }
  .insight .jp-big { font-family: var(--font-jp); }
  .insight span { display: block; margin-top: 6px; font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); }

  @media (max-width: 980px) {
    .archive-grid { grid-template-columns: 160px minmax(0, 1fr); }
    .detail { grid-column: 1 / -1; position: static; }
  }
  @media (max-width: 720px) {
    .kanji { display: none; }
    .page { width: calc(100vw - 36px); padding-top: 40px; }
    .topbar { display: grid; }
    .today-link { justify-self: start; }
    .archive-grid { grid-template-columns: 1fr; }
    .rail { position: static; }
    .toolbar { grid-template-columns: 1fr; }
    .memory-card { grid-template-columns: 58px minmax(0, 1fr); padding: 14px; }
    .detail-text { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="kanji" aria-hidden="true">一行日記</div>
<main class="page">
  <header class="topbar">
    <div>
      <div class="eyebrow">ONE LINE JOURNAL <span class="jp">一行日記</span></div>
      <h1>Memory <span>Archive</span></h1>
    </div>
    <a class="today-link" href="mock-main-v2.html">← Today</a>
  </header>

  <section class="archive-grid">
    <aside class="panel rail">
      <div class="rail-title">Years</div>
      <div class="year-stack">
        <button class="year-btn active"><span>2026</span><span>128</span></button>
        <button class="year-btn"><span>2025</span><span>241</span></button>
      </div>
      <div class="rail-title">Months</div>
      <div class="month-list" id="month-list"></div>
    </aside>

    <section>
      <div class="toolbar">
        <input class="search" type="search" placeholder="Search your memories…" aria-label="Search memories">
        <div class="mood-filter" id="mood-filter" aria-label="Filter by mood"></div>
      </div>
      <div class="memory-stream" id="memory-stream"></div>
      <nav class="pager" aria-label="Pages">
        <button id="newer" type="button">‹ newer</button>
        <span id="page-label">page 1 of 5 <span class="leaf">・</span> 42 memories</span>
        <button id="older" type="button">older ›</button>
      </nav>
    </section>

    <aside class="panel detail">
      <div class="detail-hero">
        <div class="detail-date" id="detail-date"></div>
        <p class="detail-text" id="detail-text"></p>
        <div class="detail-mood" id="detail-mood"></div>
      </div>
      <div class="mini-calendar">
        <div class="section-title" id="cal-title">Month map</div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="insight-row" id="insights"></div>
      </div>
    </aside>
  </section>
</main>

<script>
  const MOODS = {
    1: { jp: '荒', en: 'rough',   c: '#8d8a92' },
    2: { jp: '曇', en: 'cloudy',  c: '#16407a' },
    3: { jp: '凪', en: 'calm',    c: '#2e6e52' },
    4: { jp: '晴', en: 'clear',   c: '#567a26' },
    5: { jp: '輝', en: 'radiant', c: '#cf8d12' },
  };
  const P = '#f7f3eb';
  function face(n) {
    const s = `stroke="${P}" stroke-width="1.9" stroke-linecap="round" fill="none"`;
    switch (Number(n)) {
      case 1: return `<path d="M9.5,14.5 l4.4,2.1 -4.4,2.1" ${s}/><path d="M24.5,14.5 l-4.4,2.1 4.4,2.1" ${s}/><path d="M12.5,24.8 q2,-2.6 4,0 q2,2.6 4,0" ${s}/>`;
      case 2: return `<path d="M10,16.5 h4.6" ${s}/><path d="M19.4,16.5 h4.6" ${s}/><path d="M14.6,24.6 h4.8" ${s}/><path d="M26.2,12.2 q1.6,2.6 0,3.8 q-1.6,-1.2 0,-3.8" fill="${P}" opacity=".85"/>`;
      case 3: return `<path d="M9.8,15.6 q2.6,3 5.2,0" ${s}/><path d="M19,15.6 q2.6,3 5.2,0" ${s}/><path d="M13.6,23.6 q3.4,2.9 6.8,0" ${s}/>`;
      case 4: return `<path d="M9.8,17 q2.6,-3.4 5.2,0" ${s}/><path d="M19,17 q2.6,-3.4 5.2,0" ${s}/><path d="M13,22.5 q4,4.8 8,0 z" fill="${P}"/><circle cx="8.6" cy="20.6" r="1.7" fill="${P}" opacity=".4"/><circle cx="25.4" cy="20.6" r="1.7" fill="${P}" opacity=".4"/>`;
      case 5: return `<path d="M12.2,12.2 l1,2.7 2.7,1 -2.7,1 -1,2.7 -1,-2.7 -2.7,-1 2.7,-1 z" fill="${P}"/><path d="M21.8,12.2 l1,2.7 2.7,1 -2.7,1 -1,2.7 -1,-2.7 -2.7,-1 2.7,-1 z" fill="${P}"/><path d="M11.8,22 q5.2,6.2 10.4,0 z" fill="${P}"/>`;
      default: return '';
    }
  }
  function blobSvg(n) {
    const m = MOODS[n];
    return `<svg viewBox="0 0 36 36" aria-hidden="true"><ellipse cx="17" cy="19" rx="12.2" ry="11.2" fill="${m.c}"/><circle cx="31" cy="7" r="2.7" fill="${m.c}"/>${face(n)}</svg>`;
  }

  /* Sample archive: ~42 entries across 2026, deterministic. */
  const TEXTS = [
    'Sat outside with tea and watched the whole block turn gold.',
    'Solved the tiny bug that had been making the day feel louder than it was.',
    'A slow blue day, but the walk home gave it a clean edge.',
    'The demo landed, and everyone could feel the room loosen.',
    'Kept the promise small and actually kept it.',
    'Frayed at the edges, but still here, still writing the line.',
    'Dinner by the window; basil, rain, and a quiet kind of enough.',
    'Read two pages and let that count as returning.',
    'Finally tried that cafe by the park, worth every minute.',
    'Morning fog on the lake; the city forgot to be loud.',
    'Wrote the hard email, then the day got lighter.',
    'New shoes, old trail, better thoughts.',
  ];
  const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const entries = [];
  let di = 0;
  for (let t = 0; t < 130; t++) {
    const x = Math.sin(t * 91.7 + 7.3) * 43758.5453;
    const f = x - Math.floor(x);
    di += 1 + Math.floor(f * 3.2);
    const d = new Date(2026, 6, 3);
    d.setDate(d.getDate() - di);
    if (d.getFullYear() !== 2026) break;
    entries.push({
      date: d, day: d.getDate(), month: d.getMonth(), weekday: WEEKDAYS[d.getDay()],
      mood: 1 + Math.floor(f * 24) % 5,
      text: TEXTS[t % TEXTS.length],
    });
  }

  const PAGE_SIZE = 6;
  let state = { month: null, mood: 'all', query: '', page: 0 };
  let selected = entries[0];

  const stream = document.getElementById('memory-stream');
  const search = document.querySelector('.search');

  function filtered() {
    return entries.filter((e) =>
      (state.month === null || e.month === state.month) &&
      (state.mood === 'all' || e.mood === Number(state.mood)) &&
      (!state.query || e.text.toLowerCase().includes(state.query)));
  }

  function render() {
    const list = filtered();
    const pages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    state.page = Math.min(state.page, pages - 1);
    const slice = list.slice(state.page * PAGE_SIZE, (state.page + 1) * PAGE_SIZE);

    stream.innerHTML = '';
    let lastMonth = -1;
    for (const e of slice) {
      if (e.month !== lastMonth) {
        lastMonth = e.month;
        const h = document.createElement('div');
        h.className = 'month-heading';
        const count = list.filter((x) => x.month === e.month).length;
        h.innerHTML = `<h2>${MONTH_NAMES[e.month]} 2026</h2><span>${count} ${count === 1 ? 'memory' : 'memories'}</span>`;
        stream.appendChild(h);
      }
      const mood = MOODS[e.mood];
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'memory-card' + (e === selected ? ' active' : '');
      card.innerHTML = `
        <span class="date-block"><span class="day">${e.day}</span><span class="weekday">${e.weekday}</span></span>
        <span class="memory-copy">
          <span class="memory-meta">${blobSvg(e.mood)}${mood.jp} ${mood.en}</span>
          <span class="memory-text">${e.text}</span>
        </span>`;
      card.addEventListener('click', () => { selected = e; render(); renderDetail(); });
      stream.appendChild(card);
    }
    if (!slice.length) {
      stream.innerHTML = '<div class="empty">no memories match — loosen the filters, sir</div>';
    }

    document.getElementById('page-label').innerHTML =
      `page ${state.page + 1} of ${pages} <span class="leaf">・</span> ${list.length} ${list.length === 1 ? 'memory' : 'memories'}`;
    document.getElementById('newer').disabled = state.page === 0;
    document.getElementById('older').disabled = state.page >= pages - 1;
  }

  function renderDetail() {
    const m = MOODS[selected.mood];
    document.getElementById('detail-date').textContent =
      `${selected.weekday}, ${MONTH_NAMES[selected.month]} ${selected.day}, 2026`;
    document.getElementById('detail-text').textContent = selected.text;
    document.getElementById('detail-mood').innerHTML = `${blobSvg(selected.mood)}${m.jp} ${m.en}`;
    renderCalendar();
    renderInsights();
  }

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    document.getElementById('cal-title').textContent = `${MONTH_NAMES[selected.month]} map`;
    grid.innerHTML = '';
    const monthEntries = new Map(entries.filter((e) => e.month === selected.month).map((e) => [e.day, e]));
    const daysInMonth = new Date(2026, selected.month + 1, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
      const cell = document.createElement('button');
      const e = monthEntries.get(i);
      cell.type = 'button';
      cell.className = 'calendar-day' + (e ? ' has' : '') + (e === selected ? ' sel' : '');
      cell.setAttribute('aria-label', `${MONTH_NAMES[selected.month]} ${i}`);
      if (e) {
        cell.style.background = MOODS[e.mood].c;   /* every mood maps to its own pigment */
        cell.addEventListener('click', () => { selected = e; render(); renderDetail(); });
      }
      grid.appendChild(cell);
    }
  }

  function renderInsights() {
    const monthEntries = entries.filter((e) => e.month === selected.month);
    const counts = [0, 0, 0, 0, 0, 0];
    for (const e of monthEntries) counts[e.mood]++;
    const top = counts.indexOf(Math.max(...counts.slice(1)));
    document.getElementById('insights').innerHTML = `
      <div class="insight"><b>${monthEntries.length}</b><span>entries</span></div>
      <div class="insight"><b class="jp-big">${MOODS[top].jp}</b><span>top mood</span></div>
      <div class="insight"><b>11</b><span>best streak</span></div>`;
  }

  /* Rail: months */
  const monthList = document.getElementById('month-list');
  for (let m = 0; m < 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-btn'; btn.type = 'button';
    btn.textContent = MONTH_NAMES[m].slice(0, 3);
    const has = entries.some((e) => e.month === m);
    btn.disabled = !has;
    btn.addEventListener('click', () => {
      state.month = state.month === m ? null : m;   /* click again for all months */
      state.page = 0;
      monthList.querySelectorAll('.month-btn').forEach((b, i) => b.classList.toggle('active', state.month === i));
      render();
    });
    monthList.appendChild(btn);
  }

  /* Mood filter with faces */
  const moodFilter = document.getElementById('mood-filter');
  const allBtn = document.createElement('button');
  allBtn.className = 'mood-btn active'; allBtn.type = 'button'; allBtn.dataset.mood = 'all';
  allBtn.innerHTML = '<span class="all">ALL</span>';
  allBtn.setAttribute('aria-label', 'All moods');
  moodFilter.appendChild(allBtn);
  for (const [n, m] of Object.entries(MOODS)) {
    const btn = document.createElement('button');
    btn.className = 'mood-btn'; btn.type = 'button'; btn.dataset.mood = n;
    btn.setAttribute('aria-label', m.en);
    btn.innerHTML = blobSvg(n);
    moodFilter.appendChild(btn);
  }
  moodFilter.querySelectorAll('.mood-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      state.mood = btn.dataset.mood;
      state.page = 0;
      moodFilter.querySelectorAll('.mood-btn').forEach((b) => b.classList.toggle('active', b === btn));
      render();
    });
  });

  search.addEventListener('input', () => { state.query = search.value.trim().toLowerCase(); state.page = 0; render(); });
  document.getElementById('newer').addEventListener('click', () => { state.page--; render(); });
  document.getElementById('older').addEventListener('click', () => { state.page++; render(); });

  render();
  renderDetail();
</script>
</body>
</html>
